<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDC — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e8d5f5 0%, #f5d0e8 50%, #d5e0f5 100%);
      color: #3b0764;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(120,60,180,0.15);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6b21a8; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>NDC app needs an internet connection for live data. Please check your network and try again.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
